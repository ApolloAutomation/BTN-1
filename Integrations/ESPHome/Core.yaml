substitutions:
  name: apollo-btn-1
  version: "26.7.8.1"

  device_description: ${name} made by Apollo Automation - version ${version}.
  # Default update channel on first boot (no stored user choice yet, i.e. a
  # fresh flash). The beta-channel builds override this to "Beta" (see
  # Integrations/ESPHome/beta-channel/) so firmware obtained from the beta
  # channel keeps tracking it instead of offering a stable "downgrade".
  firmware_channel_default: "Stable"
  # Manifest URL bases. Stable = GitHub Pages (main branch builds).
  # Beta = rolling "beta" pre-release assets (beta branch builds).
  stable_manifest_base: "https://apolloautomation.github.io/BTN-1"
  beta_manifest_base: "https://github.com/ApolloAutomation/BTN-1/releases/download/beta-fw"


esphome:
  name: apollo-btn-1
  friendly_name: Apollo BTN-1
  comment: Apollo BTN-1
  name_add_mac_suffix: true
  project:
    name: "ApolloAutomation.BTN-1"
    version: "${version}"

  min_version: 2025.6.0

  # Wake-up detection logic
  on_boot:
    - priority: 500
      then:
        - text_sensor.template.publish:
            id: apollo_firmware_version
            state: "${version}"
        - lambda: |-
            id(deep_sleep_1).set_sleep_duration(id(deep_sleep_sleep_duration).state * 60 * 60 * 1000);
        - if:
            condition:
              or:
                - binary_sensor.is_on: ota_mode
                - switch.is_on: prevent_sleep
            then:
              - lambda: |-
                  ESP_LOGW("Apollo", "Preventing Deep Sleep Due To OTA On Boot");
                  id(deep_sleep_1).prevent_deep_sleep();
    
    - priority: -900
      then:
      - lambda: |-
          uint64_t wake = esp_sleep_get_ext1_wakeup_status();
          
          // Only process deep sleep wake if we actually woke from deep sleep
          if (wake != 0) {
            uint32_t low = wake % 0xFFFFFFFF;
            uint32_t high = (wake >> 32) % 0xFFFFFFFF;
            
            ESP_LOGI("Apollo", "Deep sleep wake detected, wake status: 0x%llx", wake);
            
            // Check which button caused the wake-up
            if ((low) & (1<<(2))) {
              id(wakeup_button_pressed).publish_state("1");
            }
            else if ((low) & (1<<(4))) {
              id(wakeup_button_pressed).publish_state("2");
            }
            else if ((low) & (1<<(6))) {
              id(wakeup_button_pressed).publish_state("3");
            }
            else if ((low) & (1<<(5))) {
              id(wakeup_button_pressed).publish_state("4");
            }
            else {
              id(wakeup_button_pressed).publish_state("0");
            }
          }
          else {
            // If no deep sleep wake and no button was detected in powered-off scenario
            // then set to "0" (no button press)
            if (id(wakeup_button_pressed).state == "") {
              ESP_LOGI("Apollo", "No wake source detected, setting to 0");
              id(wakeup_button_pressed).publish_state("0");
            }
          }
    - priority: -10
      then:
        - if:
            condition:
              - lambda: "return id(runTest);"
            then:
              - lambda: "id(testScript).execute();"
          
  on_shutdown:
    - light.turn_off: rgb_light
    - switch.turn_off: accessory_power
    - switch.turn_off: power_latch

api:
  reboot_timeout: 0s
  actions:
    - action: play_buzzer
      variables:
        song_str: string
      then:
        - rtttl.play:
            rtttl: !lambda 'return song_str;'
  on_client_connected:
    then:
      - delay: 5s
      # Trigger the button that woke up the device
      - lambda: |-
          // Get which button woke up the device
          std::string wake_button = id(wakeup_button_pressed).state;
          
          if (wake_button != "0" && wake_button != "") {
            ESP_LOGI("Apollo", "Client connected - triggering wake button %s", wake_button.c_str());
            
            // Trigger the corresponding binary sensor
            if (wake_button == "1") {
              id(button_1_event).trigger("click");
            } else if (wake_button == "2") {
              id(button_2_event).trigger("click");
            } else if (wake_button == "3") {
              id(button_3_event).trigger("click");
            } else if (wake_button == "4") {
              id(button_4_event).trigger("click");
            }
            id(wakeup_button_pressed).publish_state("0");
          }

      # Send Wake up Button State
      - component.update: wakeup_button_pressed

      # Check OTA Switch
      - delay: 3s
      - if:
          condition:
            or:
              - binary_sensor.is_on: ota_mode
              - switch.is_on: prevent_sleep
          then:
            - lambda: |- 
                ESP_LOGW("Apollo", "Preventing Deep Sleep Due To OTA Or Switch");
                id(deep_sleep_1).prevent_deep_sleep(); 
          else: 
            - lambda: |-
                id(reportAllValues).execute();
            - delay: 2s
            - deep_sleep.enter:
                id: deep_sleep_1

external_components:
  - source: github://ApolloAutomation/esphome-battery-component
    components: [max17048] #Forked OptionZero

esp32:
  variant: esp32c6
  flash_size: 8MB
  framework:
    type: esp-idf

globals:
  - id: cycleCounter
    type: int
    restore_value: no
    initial_value: '0'
  - id: button_press_timestamp
    restore_value: no
    type: uint32_t
    initial_value: '0'
  - id: runTest
    restore_value: yes
    type: bool
    initial_value: "true"
  - id: testCycleCount
    type: int
    restore_value: no
    initial_value: "0"

captive_portal:
  id: captive_portal_instance

web_server:
  id: web_server_instance
  port: 80
  version: 3

i2c:
  id: i2c_bus
  sda: GPIO1
  scl: GPIO0

# Buzzer
output:
  - platform: ledc
    pin: GPIO23
    id: buzzer
rtttl:
  id: rtttl_buzzer
  output: buzzer


deep_sleep:
  id: deep_sleep_1
  sleep_duration: 24h
  run_duration: 90s
  esp32_ext1_wakeup:
    mode: ANY_HIGH
    pins:
      - number: GPIO2
        allow_other_uses: true
      - number: GPIO4
        allow_other_uses: true
      - number: GPIO5
        allow_other_uses: true
      - number: GPIO6
        allow_other_uses: true

number:
  - platform: template
    name: "Sleep Duration"
    id: deep_sleep_sleep_duration
    min_value: 0
    max_value: 800
    step: 1
    mode: box
    update_interval: never
    optimistic: true
    restore_value: true
    initial_value: 24
    icon: "mdi:arrow-collapse-right"
    entity_category: CONFIG
    unit_of_measurement: "h"
    on_value:
      then:
        - lambda: |-
            id(deep_sleep_1).set_sleep_duration(x * 60 * 60 * 1000);

# Wake-up detection sensors
text_sensor:
  - platform: template
    id: wakeup_button_pressed
    name: "Wake-up Button Pressed"
    icon: "mdi:gesture-tap-button"
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip
  - platform: version
    name: "ESPHome Version"
    hide_timestamp: true
    entity_category: "diagnostic"
  - platform: template
    name: "Apollo Firmware Version"
    id: apollo_firmware_version
    update_interval: never
    entity_category: "diagnostic"

event:
  - platform: template
    id: button_1_event
    name: Button 1
    event_types:
      - click
      - double_click
      - triple_click
      - hold

  - platform: template
    id: button_2_event
    name: Button 2
    event_types:
      - click
      - double_click
      - triple_click
      - hold

  - platform: template
    id: button_3_event
    name: Button 3
    event_types:
      - click
      - double_click
      - triple_click
      - hold

  - platform: template
    id: button_4_event
    name: Button 4
    event_types:
      - click
      - double_click
      - triple_click
      - hold

button:
  - platform: restart
    icon: mdi:power-cycle
    name: "ESP Reboot"

  - platform: template
    name: "Firmware Update"
    id: update_firmware
    icon: mdi:cloud-download
    entity_category: "config"
    on_press:
      - logger.log: "Applying firmware based on selected channel"
      # OTA download needs the device awake for its whole duration.
      - lambda: |-
          id(deep_sleep_1).prevent_deep_sleep();
      # Free heap for the TLS download when BLE (improv) is active. Guarded
      # so images without BLE compile the same YAML.
      - lambda: |-
          #ifdef USE_ESP32_BLE
          if (esp32_ble::global_ble && esp32_ble::global_ble->is_active()) {
            ESP_LOGI("firmware", "Disabling BLE for firmware update");
            esp32_ble::global_ble->disable();
          }
          #endif
      - delay: 3s
      - script.execute: apply_ota_source
      - script.wait: apply_ota_source
      # The manifest fetch runs in its own task and YAML has no "fetch done"
      # condition to wait on (update.is_available stays false for same-version
      # switches), so give it a fixed window like R_PRO-1/CAST-1 do.
      - delay: 5s
      - update.perform:
          id: update_http_request
          force_update: true
      # Only reached if the update did not start (e.g. manifest unreachable).
      - lambda: |-
          #ifdef USE_ESP32_BLE
          if (esp32_ble::global_ble) {
            ESP_LOGI("firmware", "Re-enabling BLE (no update performed)");
            esp32_ble::global_ble->enable();
          }
          #endif
      - if:
          condition:
            and:
              - switch.is_off: prevent_sleep
              - binary_sensor.is_off: ota_mode
          then:
            - lambda: |-
                id(deep_sleep_1).allow_deep_sleep();

# Button entities for physical buttons
binary_sensor:
  - platform: status
    name: Online
    id: ink_ha_connected
  - platform: gpio
    pin:
      number: GPIO9
      inverted: true
      mode:
        input: true
        pullup: true
      ignore_strapping_warning: true
    id: reset_button
    on_multi_click:
      - timing:
          - ON for at least 10s
        then:
          # Factory reset (10s hold)
          - globals.set:
              id: testCycleCount
              value: "0"
          - globals.set:
              id: runTest
              value: "true"
          - switch.turn_on: prevent_sleep
          - switch.turn_on: factory_reset_switch
      - timing:
          - ON for at least 3s
          - OFF for at least 0.2s
        then:
          # Prevent sleep (3s hold)
          - switch.turn_on: prevent_sleep
          - lambda: |-
              id(deep_sleep_1).prevent_deep_sleep();
      - timing:
          - ON for at most 1s
          - OFF for at least 0.2s
        then:
          # Short press - run status check then test script
          - script.execute: statusCheck
          - delay: 3s
          - globals.set:
              id: testCycleCount
              value: "0"
          - globals.set:
              id: runTest
              value: "true"
          - script.execute: testScript
  - platform: gpio
    id: button_1
    name: "Button 1"
    pin:
      number: GPIO2
      allow_other_uses: true
      mode:
        input: true
        pulldown: true
    filters:
      - delayed_off: 10ms
    internal: true
    on_multi_click:
      - timing:
          - ON for at most 300ms
          - OFF for at least 0.5s
        then:
          - event.trigger:
              id: button_1_event
              event_type: click
      - timing:
          - ON for at most 300ms
          - OFF for at most 0.5s
          - ON for at most 300ms
          - OFF for at least 0.2s
        then:
          - event.trigger:
              id: button_1_event
              event_type: double_click
      - timing:
          - ON for at most 300ms
          - OFF for at most 0.5s
          - ON for at most 300ms
          - OFF for at most 0.5s
          - ON for at most 300ms
          - OFF for at least 0.5s
        then:
          - event.trigger:
              id: button_1_event
              event_type: triple_click
      - timing:
          - ON for 1s to 5s
          - OFF for at least 0.5s
        then:
          - event.trigger:
              id: button_1_event
              event_type: hold

  - platform: gpio
    id: button_2
    name: "Button 2"
    pin:
      number: GPIO4
      allow_other_uses: true
      mode:
        input: true
        pulldown: true
    filters:
      - delayed_off: 10ms
    internal: true
    on_multi_click:
      - timing:
          - ON for at most 300ms
          - OFF for at least 0.5s
        then:
          - event.trigger:
              id: button_2_event
              event_type: click
      - timing:
          - ON for at most 300ms
          - OFF for at most 0.5s
          - ON for at most 300ms
          - OFF for at least 0.2s
        then:
          - event.trigger:
              id: button_2_event
              event_type: double_click
      - timing:
          - ON for at most 300ms
          - OFF for at most 0.5s
          - ON for at most 300ms
          - OFF for at most 0.5s
          - ON for at most 300ms
          - OFF for at least 0.5s
        then:
          - event.trigger:
              id: button_2_event
              event_type: triple_click
      - timing:
          - ON for 1s to 5s
          - OFF for at least 0.5s
        then:
          - event.trigger:
              id: button_2_event
              event_type: hold

  - platform: gpio
    id: button_3
    name: "Button 3"
    pin:
      number: GPIO6
      allow_other_uses: true
      mode:
        input: true
        pulldown: true
    filters:
      - delayed_off: 10ms
    internal: true
    on_multi_click:
      - timing:
          - ON for at most 300ms
          - OFF for at least 0.5s
        then:
          - event.trigger:
              id: button_3_event
              event_type: click
      - timing:
          - ON for at most 300ms
          - OFF for at most 0.5s
          - ON for at most 300ms
          - OFF for at least 0.2s
        then:
          - event.trigger:
              id: button_3_event
              event_type: double_click
      - timing:
          - ON for at most 300ms
          - OFF for at most 0.5s
          - ON for at most 300ms
          - OFF for at most 0.5s
          - ON for at most 300ms
          - OFF for at least 0.5s
        then:
          - event.trigger:
              id: button_3_event
              event_type: triple_click
      - timing:
          - ON for 1s to 5s
          - OFF for at least 0.5s
        then:
          - event.trigger:
              id: button_3_event
              event_type: hold

  - platform: gpio
    id: button_4
    name: "Button 4"
    pin:
      number: GPIO5
      allow_other_uses: true
      mode:
        input: true
        pulldown: true
    filters:
      - delayed_off: 10ms
    internal: true
    on_multi_click:
      - timing:
          - ON for at most 300ms
          - OFF for at least 0.5s
        then:
          - event.trigger:
              id: button_4_event
              event_type: click
      - timing:
          - ON for at most 300ms
          - OFF for at most 0.5s
          - ON for at most 300ms
          - OFF for at least 0.2s
        then:
          - event.trigger:
              id: button_4_event
              event_type: double_click
      - timing:
          - ON for at most 300ms
          - OFF for at most 0.5s
          - ON for at most 300ms
          - OFF for at most 0.5s
          - ON for at most 300ms
          - OFF for at least 0.5s
        then:
          - event.trigger:
              id: button_4_event
              event_type: triple_click
      - timing:
          - ON for 1s to 5s
          - OFF for at least 0.5s
        then:
          - event.trigger:
              id: button_4_event
              event_type: hold

  - platform: homeassistant
    name: "OTA Mode"
    id: ota_mode
    entity_id: input_boolean.apollo_ota_mode
    on_press:
      then:
        - lambda: |-
            id(deep_sleep_1).prevent_deep_sleep();
    on_release:
      then:
        - if:
            condition:
              switch.is_off: prevent_sleep
            then:
              - lambda: |-
                  id(deep_sleep_1).allow_deep_sleep();

sensor:
  - platform: internal_temperature
    name: "ESP Temperature"
    id: sys_esp_temperature
    disabled_by_default: true

  - platform: uptime
    name: Uptime
    id: sys_uptime
    update_interval: 60s

  - platform: wifi_signal
    name: RSSI
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: max17048
    id: max_17048
    battery_voltage:
      name: Battery voltage
      id: batt_v
    battery_level:
      name: Battery level
      id: batt_pct
      filters:
        - lambda: |
            if (x > 100) return 100;
            else return (x);

switch:
  - platform: template
    name: "Prevent Sleep"
    id: prevent_sleep
    icon: mdi:sleep
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    entity_category: "config"
    on_turn_on:
      then:
        - lambda: |-
            id(deep_sleep_1).prevent_deep_sleep();
    on_turn_off:
      then:
        - if:
            condition:
              binary_sensor.is_off: ota_mode
            then:
              - lambda: |-
                  id(deep_sleep_1).allow_deep_sleep();
  - platform: factory_reset
    id: factory_reset_switch
    disabled_by_default: true
  - platform: gpio
    pin: GPIO19
    name: "Power Latch"
    id: power_latch
    restore_mode: ALWAYS_ON
    setup_priority: 2000
    internal: true
  - platform: gpio
    pin: GPIO18
    name: "Accessory Power"
    id: accessory_power
    restore_mode: ALWAYS_ON
    setup_priority: 2000
    internal: true

light:
  - &common_light
      platform: partition
      name: "BTN 1 Light"
      default_transition_length: 0s
      segments:
        - id: rgb_light
          from: 0
          to: 0
      effects:
        - pulse:
            name: "Slow Pulse"
            transition_length: 1000ms
            update_interval: 1000ms
            min_brightness: 0%
            max_brightness: 100%
        - pulse:
            name: "Fast Blink"
            transition_length: 100ms
            update_interval: 100ms
            min_brightness: 50%
            max_brightness: 100%
  - <<: *common_light
    name: "BTN 2 Light"
    segments:
      - id: rgb_light
        from: 1
        to: 1
  - <<: *common_light
    name: "BTN 3 Light"
    segments:
      - id: rgb_light
        from: 2
        to: 2
  - <<: *common_light
    name: "BTN 4 Light"
    segments:
      - id: rgb_light
        from: 3
        to: 3
  - platform: esp32_rmt_led_strip
    id: rgb_light
    name: "RGB Light"
    pin: GPIO21
    default_transition_length: 0s
    chipset: WS2812
    num_leds: 4
    rgb_order: grb
    internal: true
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 1000ms
          update_interval: 1000ms
          min_brightness: 0%
          max_brightness: 100%
      - pulse:
          name: "Fast Blink"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%


select:
  - platform: template
    name: "Firmware Channel"
    id: firmware_channel
    icon: mdi:source-branch
    entity_category: "config"
    optimistic: true
    restore_value: true
    options:
      - "Stable"
      - "Beta"
    initial_option: "${firmware_channel_default}"
    on_value:
      then:
        - script.execute: apply_ota_source

script:
  - id: apply_ota_source
    # Sets the OTA manifest URL from the Firmware Channel select.
    # Stable = GitHub Pages, Beta = rolling "beta" release assets.
    then:
      - lambda: |-
          const bool beta = id(firmware_channel).current_option() == "Beta";
          std::string url = beta
            ? "${beta_manifest_base}/manifest.json"
            : "${stable_manifest_base}/firmware/manifest.json";
          ESP_LOGI("firmware", "OTA manifest set to: %s", url.c_str());
          id(update_http_request).set_source_url(url);
      - component.update: update_http_request

  - id: statusCheck
    then:
      - if:
          condition:
            - lambda: 'return id(ink_ha_connected).state;'
          then:
            - logger.log: "Apollo Automation: Connected To HA"
            - light.turn_on: 
                id: rgb_light
                brightness: 100%
                red: 0%
                green: 0%
                blue: 100%
          else:
            - if:
                condition:
                  - wifi.connected
                then:
                  - logger.log: "Apollo Automation: Connected To Wifi"
                  - light.turn_on: 
                      id: rgb_light
                      brightness: 100%
                      red: 0%
                      green: 100%
                      blue: 0%
                else:
                  - logger.log: "Apollo Automation: Not Connected To Wifi"
                  - light.turn_on: 
                      id: rgb_light
                      brightness: 100%
                      red: 100%
                      green: 100%
                      blue: 0%
      - delay: 5s
      - light.turn_off: rgb_light
  - id: reportAllValues
    then:
      - component.update: wifi_signal_db
      - component.update: sys_esp_temperature
      - component.update: sys_uptime
      - component.update: wakeup_button_pressed
  
  - id: testScript
    then:
      if:
        condition:
          - lambda: "return id(runTest) == true;"
        then:
          - lambda: "id(runTest) = false;"
          - lambda: "id(testCycleCount) = 0;"
          - light.turn_on:
              id: rgb_light
              red: 0%
              green: 100%
              blue: 0%
          - delay: 5s
          - light.turn_off:
              id: rgb_light