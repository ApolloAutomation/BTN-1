# Apollo BTN-1 Zigbee Configuration - FIXED VERSION
#
# This is a complete, standalone working Zigbee configuration for BTN-1
# Successfully pairs with Home Assistant ZHA
#
# Key features:
# - Uses zigbee_esphome external component from luar123
# - ESP32-C6 with native Zigbee support
# - Custom partition table for Zigbee NVS storage
# - Binary sensors for buttons (auto-discovered by ZHA)
# - RGB LEDs for button backlighting
# - Battery monitoring via MAX17048
# - ZIGBEE RESET on 5-10s button hold for pairing mode
#
# Key learnings applied:
# - Event entities are NOT supported by Zigbee auto-discovery (removed)
# - Binary sensors with names ARE auto-discovered
# - Power switches (power_latch, accessory_power) set to internal: true
# - No internal_temperature sensor (doesn't exist reliably on ESP32-C6)
# - No uptime sensor (incompatible with deep sleep)
# - No WiFi, API, web_server, captive_portal needed
# - zigbee.reset action REQUIRED for entering pairing mode
# - on_join callback for network join confirmation
#
# IMPORTANT - First Time Flashing:
#   cd BTN-1/Integrations/ESPHome_Zigbee/examples
#   # Erase flash to clear any stale Zigbee network data
#   esptool.py --chip esp32c6 erase_flash
#   # Then compile and flash
#   esphome compile btn1_zigbee_simple_FIXED.yaml
#   esphome upload btn1_zigbee_simple_FIXED.yaml --device /dev/cu.usbmodem*
#
# Pairing:
# 1. After flashing (with erased flash), device should auto-pair
# 2. If device doesn't pair: Hold RESET button for 5-10 seconds
# 3. In Home Assistant: Settings → Devices & Services → ZHA → Add Device
# 4. Watch serial logs for "ZIGBEE NETWORK JOINED" message
# 5. Device appears as "Apollo BTN-1" with buttons, battery, and lights

esphome:
  name: apollo-btn-1-zb
  friendly_name: "Apollo BTN-1 Zigbee"

# ESP32-C6 Platform Configuration
esp32:
  board: esp32-c6-devkitm-1
  variant: esp32c6
  flash_size: 8MB
  partitions: ../partitions/partitions_zb.csv
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ZB_ENABLED: y
      CONFIG_ZB_ZCZR: y
      CONFIG_ZB_ZED: n

# External Components
external_components:
  # Zigbee support for ESP32-C6
  - source: github://luar123/zigbee_esphome
    components: [zigbee]
  # MAX17048 battery fuel gauge (forked from OptionZero)
  - source: github://ApolloAutomation/esphome-battery-component
    components: [max17048]

# Zigbee Configuration
# Using basic mode - endpoints auto-generated from components with names
zigbee:
  id: zb
  components: all
  manufacturer: "Apollo Automation"
  name: "BTN-1"
  # debug: true  # Uncomment for Zigbee stack debug messages
  on_join:
    then:
      - logger.log:
          level: INFO
          format: "*** ZIGBEE NETWORK JOINED ***"

# Logging (serial only, no WiFi)
logger:
  level: INFO
  baud_rate: 115200

# ============================================
# Globals
# ============================================
globals:
  - id: cycleCounter
    type: int
    restore_value: no
    initial_value: '0'
  - id: button_press_timestamp
    restore_value: no
    type: uint32_t
    initial_value: '0'

# ============================================
# I2C Bus Configuration
# ============================================
i2c:
  id: i2c_bus
  sda: GPIO1
  scl: GPIO0

# ============================================
# Buzzer Output (LEDC)
# ============================================
output:
  - platform: ledc
    pin: GPIO23
    id: buzzer

rtttl:
  id: rtttl_buzzer
  output: buzzer

# ============================================
# Deep Sleep Configuration
# ============================================
deep_sleep:
  id: deep_sleep_1
  sleep_duration: 24h
  run_duration: 90s
  esp32_ext1_wakeup:
    mode: ANY_HIGH
    pins:
      - number: GPIO2
        allow_other_uses: true
      - number: GPIO4
        allow_other_uses: true
      - number: GPIO5
        allow_other_uses: true
      - number: GPIO6
        allow_other_uses: true

# ============================================
# Sleep Duration Configuration
# ============================================
number:
  - platform: template
    name: "Sleep Duration"
    id: deep_sleep_sleep_duration
    min_value: 0
    max_value: 800
    step: 1
    mode: box
    update_interval: never
    optimistic: true
    restore_value: true
    initial_value: 24
    icon: "mdi:arrow-collapse-right"
    entity_category: CONFIG
    unit_of_measurement: "h"
    on_value:
      then:
        - lambda: |-
            id(deep_sleep_1).set_sleep_duration(x * 60 * 60 * 1000);

# ============================================
# Button Binary Sensors
# NOT internal - exposed for Zigbee auto-discovery
# ============================================
binary_sensor:
  # Reset Button (GPIO9) - Internal
  # Hold 3-5s: Prevent sleep
  # Hold 5-10s: Reset Zigbee (enter pairing mode)
  # Hold 10s+: Factory reset
  - platform: gpio
    pin:
      number: GPIO9
      inverted: true
      mode:
        input: true
        pullup: true
      ignore_strapping_warning: true
    id: reset_button
    name: "Reset Button"
    internal: true
    on_press:
      then:
        - logger.log:
            level: INFO
            format: "Reset button pressed - hold 5-10s to reset Zigbee"
        - lambda: |-
            id(button_press_timestamp) = millis();
    on_release:
      then:
        - lambda: |-
            uint32_t hold_time = millis() - id(button_press_timestamp);
            ESP_LOGI("button", "Reset button released after %d ms", hold_time);
            
            if (hold_time >= 10000) {
              // 10+ seconds: Factory reset
              ESP_LOGI("button", "Factory reset triggered!");
              id(prevent_sleep).turn_on();
              id(factory_reset_switch).turn_on();
            }
            else if (hold_time >= 3000) {
              // 3-5 seconds: Prevent sleep
              ESP_LOGI("button", "Prevent sleep activated");
              id(prevent_sleep).turn_on();
              id(deep_sleep_1).prevent_deep_sleep();
            }
    # CRITICAL: 5-10 second hold triggers Zigbee reset (pairing mode)
    on_click:
      min_length: 5s
      max_length: 10s
      then:
        - logger.log:
            level: INFO
            format: "*** ZIGBEE RESET - Entering pairing mode ***"
        - zigbee.reset: zb

  # Button 1 (GPIO2) - Exposed for Zigbee
  # CRITICAL: on_press/on_release with zigbee.report required for ZHA to receive button states
  - platform: gpio
    id: button_1
    name: "Button 1"
    pin:
      number: GPIO2
      allow_other_uses: true
      mode:
        input: true
        pulldown: true
    on_press:
      then:
        - logger.log:
            level: INFO
            format: "Button 1 PRESSED - sending Zigbee report"
        - zigbee.report: zb
    on_release:
      then:
        - logger.log:
            level: INFO
            format: "Button 1 RELEASED - sending Zigbee report"
        - zigbee.report: zb

  # Button 2 (GPIO4) - Exposed for Zigbee
  - platform: gpio
    id: button_2
    name: "Button 2"
    pin:
      number: GPIO4
      allow_other_uses: true
      mode:
        input: true
        pulldown: true
    on_press:
      then:
        - logger.log:
            level: INFO
            format: "Button 2 PRESSED - sending Zigbee report"
        - zigbee.report: zb
    on_release:
      then:
        - logger.log:
            level: INFO
            format: "Button 2 RELEASED - sending Zigbee report"
        - zigbee.report: zb

  # Button 3 (GPIO6) - Exposed for Zigbee
  - platform: gpio
    id: button_3
    name: "Button 3"
    pin:
      number: GPIO6
      allow_other_uses: true
      mode:
        input: true
        pulldown: true
    on_press:
      then:
        - logger.log:
            level: INFO
            format: "Button 3 PRESSED - sending Zigbee report"
        - zigbee.report: zb
    on_release:
      then:
        - logger.log:
            level: INFO
            format: "Button 3 RELEASED - sending Zigbee report"
        - zigbee.report: zb

  # Button 4 (GPIO5) - Exposed for Zigbee
  - platform: gpio
    id: button_4
    name: "Button 4"
    pin:
      number: GPIO5
      allow_other_uses: true
      mode:
        input: true
        pulldown: true
    on_press:
      then:
        - logger.log:
            level: INFO
            format: "Button 4 PRESSED - sending Zigbee report"
        - zigbee.report: zb
    on_release:
      then:
        - logger.log:
            level: INFO
            format: "Button 4 RELEASED - sending Zigbee report"
        - zigbee.report: zb

# ============================================
# Battery Monitoring (MAX17048 on I2C)
# ============================================
sensor:
  - platform: max17048
    id: max_17048
    battery_voltage:
      name: "Battery Voltage"
      id: batt_v
    battery_level:
      name: "Battery Level"
      id: batt_pct
      filters:
        - lambda: |
            if (x > 100) return 100;
            else return (x);

# ============================================
# Switches
# ============================================
switch:
  # Prevent Sleep (User-accessible)
  - platform: template
    name: "Prevent Sleep"
    id: prevent_sleep
    icon: mdi:sleep
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    entity_category: "config"
    on_turn_on:
      then:
        - lambda: |-
            id(deep_sleep_1).prevent_deep_sleep();
    on_turn_off:
      then:
        - lambda: |-
            id(deep_sleep_1).allow_deep_sleep();

  # Factory Reset (Internal)
  - platform: factory_reset
    id: factory_reset_switch
    disabled_by_default: true

  # Power Latch (Internal - must stay on for device to work)
  - platform: gpio
    pin: GPIO19
    name: "Power Latch"
    id: power_latch
    restore_mode: ALWAYS_ON
    setup_priority: 2000
    internal: true

  # Accessory Power (Internal)
  - platform: gpio
    pin: GPIO18
    name: "Accessory Power"
    id: accessory_power
    restore_mode: ALWAYS_ON
    setup_priority: 2000
    internal: true

# ============================================
# RGB LEDs (WS2812 on GPIO21, 4 LEDs)
# ============================================
light:
  # Main RGB Strip (internal, used by partition lights)
  - platform: esp32_rmt_led_strip
    id: rgb_light
    name: "RGB Light"
    pin: GPIO21
    default_transition_length: 0s
    chipset: WS2812
    num_leds: 4
    rgb_order: grb
    internal: true
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 1000ms
          update_interval: 1000ms
          min_brightness: 0%
          max_brightness: 100%
      - pulse:
          name: "Fast Blink"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%

  # BTN 1 Light (LED 0) - Exposed for Zigbee
  - platform: partition
    name: "BTN 1 Light"
    id: btn_1_light
    default_transition_length: 0s
    segments:
      - id: rgb_light
        from: 0
        to: 0
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 1000ms
          update_interval: 1000ms
          min_brightness: 0%
          max_brightness: 100%
      - pulse:
          name: "Fast Blink"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%

  # BTN 2 Light (LED 1) - Exposed for Zigbee
  - platform: partition
    name: "BTN 2 Light"
    id: btn_2_light
    default_transition_length: 0s
    segments:
      - id: rgb_light
        from: 1
        to: 1
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 1000ms
          update_interval: 1000ms
          min_brightness: 0%
          max_brightness: 100%
      - pulse:
          name: "Fast Blink"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%

  # BTN 3 Light (LED 2) - Exposed for Zigbee
  - platform: partition
    name: "BTN 3 Light"
    id: btn_3_light
    default_transition_length: 0s
    segments:
      - id: rgb_light
        from: 2
        to: 2
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 1000ms
          update_interval: 1000ms
          min_brightness: 0%
          max_brightness: 100%
      - pulse:
          name: "Fast Blink"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%

  # BTN 4 Light (LED 3) - Exposed for Zigbee
  - platform: partition
    name: "BTN 4 Light"
    id: btn_4_light
    default_transition_length: 0s
    segments:
      - id: rgb_light
        from: 3
        to: 3
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 1000ms
          update_interval: 1000ms
          min_brightness: 0%
          max_brightness: 100%
      - pulse:
          name: "Fast Blink"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%

# ============================================
# Restart Button
# ============================================
button:
  - platform: restart
    icon: mdi:power-cycle
    name: "ESP Reboot"
