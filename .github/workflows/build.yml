name: Build and Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bypass-yaml-check:
        description: 'Bypass YAML change check (force build/publish)'
        type: boolean
        required: false
        default: false
  # release:
  #   types: [published]

jobs:
  build-and-publish:
    uses: ApolloAutomation/Workflows/.github/workflows/build.yml@main
    permissions:
      contents: write
      pages: write
      id-token: write
      pull-requests: write
    with:
      device-name: btn-1
      # BTN-1_Minimal.yaml is the end-user image served at firmware/ (OTA
      # updates and dashboard adoption). BTN-1.yaml (improv + BLE) is only
      # used for first flashes via the web installer.
      yaml-files: |
        Integrations/ESPHome/BTN-1_Minimal.yaml
        Integrations/ESPHome/BTN-1.yaml
      firmware-names: "1_Minimal:firmware,1:firmware-factory"
      core-yaml-path: Integrations/ESPHome/Core.yaml
      esphome-version: stable
      # Bypass check if manually triggered with bypass option
      check-yaml-changes: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.bypass-yaml-check == 'true') }}
      publish-to-pages: true
      has-installer: true
      installer-path: static